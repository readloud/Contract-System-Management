# ============================================
# DOCKER COMPOSE PRODUCTION CONFIGURATION
# Contract Management System - Production Environment
# ============================================
version: '3.8'

services:
  # ==========================================
  # POSTGRESQL DATABASE - Production
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: cms-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backup/postgres:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - cms_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # REDIS CACHE - Production
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: cms-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cms_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # BACKEND API - Production (NestJS)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: cms-backend:latest
    container_name: cms-backend-prod
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cms_prod_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================
  # REALTIME SERVER - Production (Hocuspocus + Yjs)
  # ==========================================
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: cms-realtime:latest
    container_name: cms-realtime-prod
    restart: always
    ports:
      - "1234:1234"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    env_file:
      - ./realtime/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(1234).on('connect', () => process.exit(0)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cms_prod_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # FRONTEND - Production (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: cms-frontend:latest
    container_name: cms-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
      - realtime
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cms_prod_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================
  # NGINX REVERSE PROXY - Production
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: cms-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - realtime
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cms_prod_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # PROMETHEUS - Monitoring (Optional)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cms-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - cms_prod_network
    profiles:
      - monitoring

  # ==========================================
  # GRAFANA - Dashboard (Optional)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: cms-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - cms_prod_network
    profiles:
      - monitoring

  # ==========================================
  # POSTGRES BACKUP SCHEDULER (Optional)
  # ==========================================
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:latest
    container_name: cms-postgres-backup
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z6 --schema=public --blobs
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=30
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
    volumes:
      - ./backup/postgres:/backups
    depends_on:
      - postgres
    networks:
      - cms_prod_network
    profiles:
      - backup

# ==========================================
# VOLUMES PERSISTENCE
# ==========================================
volumes:
  postgres_prod_data:
    driver: local
    name: cms_postgres_prod_data
  redis_prod_data:
    driver: local
    name: cms_redis_prod_data
  backend_logs:
    driver: local
    name: cms_backend_logs
  nginx_logs:
    driver: local
    name: cms_nginx_logs
  prometheus_data:
    driver: local
    name: cms_prometheus_data
  grafana_data:
    driver: local
    name: cms_grafana_data

# ==========================================
# NETWORKS
# ==========================================
networks:
  cms_prod_network:
    driver: bridge
    name: cms_prod_network
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1