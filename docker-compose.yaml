# ============================================
# DOCKER COMPOSE - Format terbaru (no version)
# Contract Management System
# ============================================

services:
  # ==========================================
  # POSTGRESQL DATABASE
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_DB: cms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms_network

  # ==========================================
  # REDIS CACHE
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: cms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms_network

  # ==========================================
  # BACKEND - NestJS
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: cms-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    networks:
      - cms_network

  # ==========================================
  # REALTIME - Hocuspocus
  # ==========================================
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
      target: development
    container_name: cms-realtime
    restart: unless-stopped
    ports:
      - "1234:1234"
    environment:
      - NODE_ENV=development
    env_file:
      - ./realtime/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./realtime:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    networks:
      - cms_network

  # ==========================================
  # FRONTEND - Next.js
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: cms-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - ./frontend/.env.docker
    depends_on:
      backend:
        condition: service_started
      realtime:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    networks:
      - cms_network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  postgres_data:
    name: cms_postgres_data
  redis_data:
    name: cms_redis_data

# ==========================================
# NETWORKS
# ==========================================
networks:
  cms_network:
    name: cms_network
    driver: bridge
