services:
  postgres:
    image: postgres:15-alpine
    container_name: cms-postgres
    environment:
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_DB: cms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    container_name: cms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - cms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - cms_network

  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: cms-realtime
    ports:
      - "1234:1234"
    environment:
      - NODE_ENV=development
    env_file:
      - ./realtime/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./realtime:/app
      - /app/node_modules
    networks:
      - cms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
      - realtime
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - cms_network

  nginx:
    image: nginx:alpine
    container_name: cms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - realtime
    networks:
      - cms_network
    profiles:
      - production

networks:
  cms_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local